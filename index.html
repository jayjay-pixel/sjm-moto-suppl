<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d32f2f">
  <title>SJM Moto Supply | Authorized Shell Distributor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="Logo.png">
  <link rel="apple-touch-icon" href="Logo.png">
</head>
<body>
  <header class="main-header">
    <h1>SJM Moto Supply</h1>
    <p>Straight from the Authorized Shell Distributor</p>
  </header>

  <main class="container">
    <section class="products-section">
      <h2>Products</h2>
      <div id="product-grid" class="products-grid"></div>
    </section>

    <section id="cart-section" class="cart-card">
      <h2>🛒 Your Cart</h2>
      <div id="cart-items" class="cart-list"></div>
      
      <div class="customer-info">
        <label for="customer-name">Customer's Name:</label>
        <input type="text" id="customer-name" placeholder="Full Name" required>
      </div>

      <div class="cart-summary">
        <h3>Total: ₱<span id="total">0.00</span></h3>
        <button id="checkout-btn" class="btn-primary">Checkout via Messenger</button>
      </div>
    </section>
  </main>

  <div id="toast-container"></div>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SJM App Registered'))
        .catch(err => console.log('PWA Error', err));
    });
  }
</script>
  <script src="script.js"></script>
</body>
</html>

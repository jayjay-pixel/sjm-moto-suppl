<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SJM Moto Supply | Shop & Services</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="main-header">
    <div class="logo-area">
      <h1>SJM Online Shop and Services</h1>
      <p>Product direct from authorized distributors</p>
    </div>
    <nav class="nav-tabs">
      <button type="button" id="show-oils" class="tab-btn active">🛒 Buy Oil</button>
      <button type="button" id="show-services" class="tab-btn">🔧 Book Service</button>
    </nav>
  </header>

  <main class="container">
    <section id="shop-view">
      <h2 id="section-title">Motorcycle Oil</h2>
      <div id="product-grid" class="products-grid"></div>
    </section>

    <section id="cart-section" class="cart-card">
      <div class="cart-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Your Selection</h2>
        <span id="cart-count">0 items</span>
      </div>
      
      <div id="cart-items" class="cart-list">
        </div>

      <div class="booking-details">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="customer-name" placeholder="Enter your name" required>
        </div>

        <div id="service-options" class="service-panel" style="display:none; margin-top: 20px;">
          <label>Order Preference</label>
          <div class="mode-selector">
            <button type="button" id="btn-shop" class="mode-btn active">Walk-in / Pickup</button>
            <button type="button" id="btn-home" class="mode-btn">Home Delivery</button>
          </div>
          
          <div id="distance-box" style="display:none; margin-top: 15px;">
            <label>Input Your Location</label>
            <input type="text" id="distance" placeholder="Brgy, Street, or Landmark">
            <p class="fee-note">Service/Delivery fee may vary based on location.</p>
          </div>
        </div>
      </div>

      <div class="cart-summary">
        <div class="total-row">
          <span>Total Amount:</span>
          <span class="total-price">₱<span id="total">0.00</span></span>
        </div>
        <button id="checkout-btn" class="btn-checkout">Confirm via Messenger</button>
      </div>
    </section>
  </main>

  <div id="toast-container"></div>

  <script src="script.js?v=7"></script>
</body>
</html>
